<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#FFC107;
color:#000;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

#map{
height:550px;
margin:10px;
border-radius:15px;
}

.box{
background:#222;
margin:10px;
padding:15px;
border-radius:15px;
text-align:center;
}

button{
background:#FFC107;
border:0;
padding:10px;
margin:5px;
border-radius:10px;
font-weight:bold;
}

img{
max-width:200px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>


<header>
🟡 SILVER HUNTER
</header>


<div id="map"></div>


<div class="box" id="info">
Klik pin toko
</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="toko.js"></script>


<script>


var map=L.map('map')
.setView([-7.02,107.52],13);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



function warna(status){

if(status=="🟢 Ada Stok")
return "green";

if(status=="🔴 Habis")
return "red";

return "orange";

}



toko.forEach(function(t,i){


var status=
localStorage.getItem("stok"+i)
||"🟡 Belum Dicek";



var marker=L.circleMarker(
[t.lat,t.lng],
{
radius:12,
color:warna(status),
fillColor:warna(status),
fillOpacity:1
}

).addTo(map);



marker.on("click",function(){


var foto=
localStorage.getItem("foto"+i);


document.getElementById("info").innerHTML=

"<h3>📍 "+t.nama+"</h3>"+
t.jenis+
"<br><br>"+
"🚗 Fast & Furious Silver Series"+
"<br>🏎️ Toyota Supra Kuning"+
"<br><br>"+
"Status: <b>"+status+"</b>"+
"<br><br>"+

"<button onclick=\"stok("+i+",'🟢 Ada Stok')\">🟢 Ada</button>"+
"<button onclick=\"stok("+i+",'🔴 Habis')\">🔴 Habis</button>"+
"<button onclick=\"stok("+i+",'🟡 Belum Dicek')\">🟡 Reset</button>"+
"<br>"+

"<button onclick=\"rute('"+t.alamat+"')\">📍 Rute</button>"+
"<br><br>"+

"<input type='file' accept='image/*' onchange='foto(event,"+i+")'>"+

(foto ? "<br><img src='"+foto+"'>" : "");



});


});





function stok(i,nama){

localStorage.setItem(
"stok"+i,
nama
);

location.reload();

}




function foto(event,i){

var reader=new FileReader();

reader.onload=function(){

localStorage.setItem(
"foto"+i,
reader.result
);

location.reload();

}

reader.readAsDataURL(event.target.files[0]);

}





function rute(alamat){

window.open(

"https://www.google.com/maps/search/?api=1&query="+
encodeURIComponent(alamat),

"_blank"

);

}



</script>


</body>
</html>
