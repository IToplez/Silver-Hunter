<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#FFC107;
color:black;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}


.top{
text-align:center;
padding:10px;
}


#map{
height:520px;
margin:10px;
border-radius:15px;
}


.box{

background:#222;
margin:10px;
padding:12px;
border-radius:15px;
text-align:center;

}


button{

background:#FFC107;
border:0;
padding:6px 9px;
margin:3px;
border-radius:8px;
font-size:12px;
font-weight:bold;

}


img{

max-width:180px;
border-radius:10px;
margin-top:10px;

}


</style>

</head>


<body>


<header>
🟡 SILVER HUNTER
</header>


<div class="top">

🚗 Hot Wheels Fast & Furious
<br>
🏎️ Target: Toyota Supra Kuning
<br>
📍 Soreang - Ciwidey

</div>



<div id="map"></div>



<div class="box">

🔴 Alfamart
&nbsp;&nbsp;
🔵 Indomaret

<br>

🟢 Ada Stok
&nbsp;
🟡 Belum Dicek
&nbsp;
🔴 Habis

</div>



<div class="box" id="info">

Klik ikon toko

</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="toko.js"></script>


<script>


var map=L.map('map')
.setView([-7.02,107.52],13);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



function buatIkon(jenis){

return L.divIcon({

html:
jenis=="Alfamart"
?
"<div style='font-size:25px'>🔴</div>"
:
"<div style='font-size:25px'>🔵</div>",

className:"",

iconSize:[30,30]

});

}




toko.forEach(function(t,i){



var status=
localStorage.getItem("stok"+i)
||
"🟡 Belum Dicek";



var marker=L.marker(

[t.lat,t.lng],

{
icon:buatIkon(t.jenis)
}

).addTo(map);



marker.on("click",function(){



var foto=
localStorage.getItem("foto"+i);



document.getElementById("info").innerHTML=


"<b>📍 "+t.nama+"</b>"+
"<br>"+
t.jenis+
"<br><br>"+

"🚗 Fast & Furious Silver Series"+
"<br>"+
"🏎️ Toyota Supra Kuning"+
"<br><br>"+

"Status:<br>"+
"<b>"+status+"</b>"+

"<br><br>"+


"<button onclick=\"ubah("+i+",'🟢 Ada Stok')\">🟢 Ada</button>"+

"<button onclick=\"ubah("+i+",'🔴 Habis')\">🔴 Habis</button>"+

"<button onclick=\"ubah("+i+",'🟡 Belum Dicek')\">🟡 Reset</button>"+


"<br>"+

"<button onclick=\"rute('"+t.alamat+"')\">📍 Rute</button>"+

"<br><br>"+


"📸 Foto stok"+
"<br>"+

"<input type='file' accept='image/*' onchange='uploadFoto(event,"+i+")'>"+


(foto?

"<br><img src='"+foto+"'>"

:"");


});



});





function ubah(i,status){


localStorage.setItem(

"stok"+i,

status

);


location.reload();


}




function uploadFoto(event,i){


var file=event.target.files[0];


var reader=new FileReader();



reader.onload=function(){


localStorage.setItem(

"foto"+i,

reader.result

);


location.reload();


}



reader.readAsDataURL(file);



}





function rute(alamat){


window.open(

"https://www.google.com/maps/search/?api=1&query="+

encodeURIComponent(alamat),

"_blank"

);


}


</script>


</body>
</html>
