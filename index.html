<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#FFC107;
color:black;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.menu{
text-align:center;
padding:10px;
}

#map{
height:550px;
margin:10px;
border-radius:15px;
}

.info{
background:#222;
margin:10px;
padding:15px;
border-radius:15px;
text-align:center;
}

button{
background:#FFC107;
border:0;
padding:10px;
margin:5px;
border-radius:10px;
font-weight:bold;
}

.alf{
color:red;
}

.indo{
color:#00aaff;
}

</style>

</head>


<body>


<header>
🟡 SILVER HUNTER
</header>


<div class="menu">

🚗 Hot Wheels Fast & Furious
<br>
🏎️ Target: Toyota Supra Kuning
<br>
📍 Soreang - Ciwidey

</div>


<div id="map"></div>


<div class="info" id="info">
Klik pin toko
</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="toko.js"></script>


<script>


var map=L.map('map')
.setView([-7.000,107.550],13);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



toko.forEach(function(t,i){


var status=
localStorage.getItem("stok"+i)
||"🟡 Belum Dicek";


var warna =
t.jenis=="Alfamart" ? "red":"blue";



var marker=L.circleMarker(
[t.lat,t.lng],
{
radius:10,
color:warna,
fillColor:warna,
fillOpacity:1
}
).addTo(map);



marker.on("click",function(){


document.getElementById("info").innerHTML=

"<b>📍 "+t.nama+"</b>"+
"<br>"+t.jenis+
"<br><br>"+
"🚗 Fast & Furious Silver Series"+
"<br>🏎️ Toyota Supra Kuning"+
"<br><br>"+
"Status: "+status+
"<br><br>"+

"<button onclick=\"ubah("+i+",'🟢 Ada Stok')\">🟢 Ada</button>"+
"<button onclick=\"ubah("+i+",'🔴 Habis')\">🔴 Habis</button>"+
"<br>"+
"<button onclick=\"rute('"+t.alamat+"')\">📍 Rute</button>";



});


});




function ubah(i,status){

localStorage.setItem(
"stok"+i,
status
);

location.reload();

}



function rute(alamat){

var url=
"https://www.google.com/maps/search/?api=1&query="
+
encodeURIComponent(alamat);


window.open(url,"_blank");

}


</script>


</body>
</html>
