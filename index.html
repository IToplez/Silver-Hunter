<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#FFC107;
color:black;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.card{
padding:15px;
text-align:center;
}

button{
background:#FFC107;
border:0;
padding:12px;
margin:5px;
border-radius:10px;
font-weight:bold;
}

#map{
height:500px;
margin:15px;
border-radius:15px;
}

.info{
background:#222;
padding:15px;
border-radius:15px;
margin:15px;
}

</style>

</head>

<body>


<header>
🟡 SILVER HUNTER
</header>


<div class="card">

<h2>
🚗 Fast & Furious Silver Series
</h2>

<p>
Target: Toyota Supra Kuning
</p>

</div>


<div id="map"></div>


<div class="info" id="info">
Klik titik Alfamart untuk melihat laporan
</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


var map = L.map('map')
.setView([-6.9175,107.6191],12);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



var toko=[

{
nama:"Alfamart Antapani",
lat:-6.914,
lng:107.660,
status:"🟡 Belum Dicek"
},

{
nama:"Alfamart Buah Batu",
lat:-6.950,
lng:107.630,
status:"🟢 Ada Stok"
},

{
nama:"Alfamart Cimahi",
lat:-6.872,
lng:107.542,
status:"🔴 Habis"
},

{
nama:"Alfamart Cibiru",
lat:-6.917,
lng:107.716,
status:"🟡 Belum Dicek"
}

];



toko.forEach(function(t){

var marker=L.marker(
[t.lat,t.lng]
).addTo(map);



marker.on('click',function(){

document.getElementById("info").innerHTML=

"<h3>"+t.nama+"</h3>"+
"🚗 Hot Wheels Fast & Furious<br>"+
"🏎️ Toyota Supra Kuning<br><br>"+
"Status:<br>"+
t.status+
"<br><br>"+
"<button onclick=\"ubah('"+t.nama+"')\">Update Stok</button>";

});


});



function ubah(nama){

alert(
"Update "+nama+
"\n\nFitur laporan komunitas akan ditambahkan berikutnya."
);

}



</script>


</body>
</html>
