<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#FFC107;
color:#000;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.menu{
padding:15px;
text-align:center;
}

#map{
height:550px;
margin:10px;
border-radius:15px;
}

.info{
background:#222;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

button{
background:#FFC107;
border:0;
padding:12px;
margin:5px;
border-radius:10px;
font-weight:bold;
}

h2{
color:#FFC107;
}

</style>

</head>


<body>


<header>
🟡 SILVER HUNTER
</header>


<div class="menu">

<h2>
🚗 Fast & Furious Silver Series
</h2>

<p>
Target: Toyota Supra Kuning
<br>
📍 Bandung Raya
</p>

</div>


<div id="map"></div>


<div class="info" id="info">
Klik marker Alfamart untuk melihat status
</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


var map = L.map('map')
.setView([-6.9175,107.6191],12);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);



var toko=[


["Alfamart Antapani",-6.914,107.660],

["Alfamart Buah Batu",-6.950,107.630],

["Alfamart Cibiru",-6.917,107.716],

["Alfamart Cimahi",-6.872,107.542],

["Alfamart Dago",-6.885,107.613],

["Alfamart Kopo",-6.948,107.590],

["Alfamart Setiabudi",-6.865,107.592],

["Alfamart Ujungberung",-6.914,107.704],

["Alfamart Soreang",-7.025,107.518],

["Alfamart Padalarang",-6.840,107.480],

["Alfamart Lembang",-6.812,107.617],

["Alfamart Baleendah",-7.000,107.630]


];



var markers=[];



function warna(status){

if(status=="🟢 Ada Stok")
return "green";

if(status=="🔴 Habis")
return "red";

return "orange";

}



function tampil(){

markers.forEach(m=>map.removeLayer(m));

markers=[];


toko.forEach(function(t,i){


var status=
localStorage.getItem("stok"+i)
||"🟡 Belum Dicek";



var marker=L.circleMarker(
[t[1],t[2]],
{
radius:10,
color:warna(status),
fillColor:warna(status),
fillOpacity:1
}

).addTo(map);



marker.on("click",function(){


document.getElementById("info").innerHTML=

"<h3>"+t[0]+"</h3>"+
"🚗 Fast & Furious Silver Series<br>"+
"🏎️ Toyota Supra Kuning<br><br>"+
"Status sekarang:<br>"+
status+
"<br><br>"+

"<button onclick='ubah("+i+",\"🟢 Ada Stok\")'>🟢 Ada Stok</button>"+

"<button onclick='ubah("+i+",\"🟡 Belum Dicek\")'>🟡 Belum Dicek</button>"+

"<button onclick='ubah("+i+",\"🔴 Habis\")'>🔴 Habis</button>";



});


markers.push(marker);


});


}



function ubah(i,status){

localStorage.setItem(
"stok"+i,
status
);


alert(
"Status berhasil diubah menjadi:\n"+status
);


tampil();


}



tampil();


</script>


</body>
</html>
