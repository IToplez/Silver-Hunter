<!DOCTYPE html>
<html>
<head>

<title>Silver Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#FFC107;
color:black;
padding:25px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
}

.card{
background:#222;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px black;
}

.car{
font-size:60px;
}

h2{
color:#FFC107;
}

.status{
background:#555;
padding:12px;
border-radius:10px;
margin:15px;
}

button{

width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:15px;
background:#FFC107;
font-size:17px;
font-weight:bold;
cursor:pointer;

}

button:hover{
background:#ffd54f;
}


#map{

height:400px;
margin-top:20px;
border-radius:15px;

}


.footer{

text-align:center;
color:#aaa;
margin-top:20px;

}

</style>

</head>


<body>


<header>
🟡 SILVER HUNTER
</header>


<div class="container">


<div class="card">


<div class="car">
🚗
</div>


<h2>
Hot Wheels Fast & Furious
</h2>


<h3>
Silver Series
</h3>


<p>
🏎️ Target:
<br>
Toyota Supra Kuning
</p>


<div class="status">
🟡 Status: Belum Dicek
</div>



<button onclick="mulaiHunting()">
🚗 Mulai Hunting
</button>


<button onclick="tampilkanPeta()">
🗺️ Tampilkan Peta Bandung
</button>


<div id="map"></div>


</div>



<div class="footer">

Silver Hunter v1.0
<br>
Hunter Hot Wheels Bandung

</div>


</div>




<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


function mulaiHunting(){

alert(
"🚗 Hunting Dimulai!\n\n"+
"Target:\n"+
"Hot Wheels Fast & Furious Silver Series\n"+
"Toyota Supra Kuning\n\n"+
"Area:\nBandung"
);

}



function tampilkanPeta(){


var map = L.map('map').setView(
[-6.9175,107.6191],
13
);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{

maxZoom:19

}

).addTo(map);



L.marker(
[-6.9175,107.6191]
)

.addTo(map)

.bindPopup(
"🟡 Silver Hunter<br>Bandung"
)

.openPopup();



}


</script>



</body>
</html>
